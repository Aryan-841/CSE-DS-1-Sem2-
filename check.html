<!DOCTYPE html>
<html>
<head>
    <title>Odd or Even Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            width: 350px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Odd or Even Checker</h2>

        <input type="number" id="num" placeholder="Enter a number">

        <br>

        <button onclick="checkNumber()">Check</button>

        <p id="result"></p>
    </div>

    <script>
        function checkNumber() {
            let number = document.getElementById("num").value;

            if (number === "") {
                document.getElementById("result").innerHTML =
                    "Please enter a number!";
                return;
            }

            if (number % 2 === 0) {
                document.getElementById("result").innerHTML =
                    number + " is Even";
            } else {
                document.getElementById("result").innerHTML =
                    number + " is Odd";
            }
        }
    </script>

</body>
</html>
